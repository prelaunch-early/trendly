<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZXLDXV9K9D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZXLDXV9K9D');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendly | Crack the Code to Going Viral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }
        /* 你的原有样式全部保留 */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .animated-gradient {
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .custom-shadow { box-shadow: 0 20px 50px -12px rgba(99, 102, 241, 0.2); }
        .hidden-section { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s ease-out; }
        .show-section { display: block; opacity: 1; transform: translateY(0); }
        .float-animation { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } 100% { transform: translateY(0px) rotate(0deg); } }
        .spark-rotate { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .bento-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bento-card:hover { transform: scale(1.02); }
        .squiggly-path { stroke-dasharray: 10; animation: dash 20s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -200; } }
        @keyframes equalizer { 0%, 100% { height: 40%; } 50% { height: 100%; } }
        .bar-anim { animation: equalizer 1.5s ease-in-out infinite; }
        @keyframes slide-in-faint { 0% { opacity: 0; transform: translateX(-10px); } 100% { opacity: 1; transform: translateX(0); } }
        .comment-pop { animation: slide-in-faint 2s ease-out infinite alternate; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }
        .scan-ring { animation: pulse-ring 2s ease-out infinite; }
        @keyframes coin-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(10deg); } }
        .coin-anim { animation: coin-float 3s ease-in-out infinite; }
        @keyframes tag-pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }
        .tag-anim { animation: tag-pulse 2s infinite ease-in-out; }
        @keyframes blueprint-line { 0% { height: 0; } 100% { height: 100%; } }
        .line-grow { animation: blueprint-line 2s forwards ease-out; }

        /* 弹窗收集邮箱样式 */
        #email-popup {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:9999;
        }
        #email-popup form { display:flex; flex-direction: column; gap:1rem; }
        #email-popup input { padding:0.75rem; border-radius:1rem; border:1px solid #ccc; outline:none; flex:1; }
        #email-popup button { padding:0.75rem; border-radius:1rem; background:#6366f1; color:white; font-weight:bold; cursor:pointer; border:none; }
        #close-popup { margin-top:0.5rem; color:#555; text-decoration:underline; cursor:pointer; background:none; border:none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- 这里保持你原有的 Header, Hero, Sections, Footer 全部不变 -->

    <!-- URL Input Box 在 Hero 中 -->
    <div class="max-w-2xl mx-auto mb-8 p-2 bg-white rounded-3xl custom-shadow flex flex-col md:flex-row gap-2 border border-slate-100">
        <input type="text" 
            id="url-input"
            placeholder="Paste a YouTube link here..." 
            class="flex-1 px-6 py-4 text-lg bg-transparent border-none focus:ring-0 outline-none font-medium"
        >
        <button id="analyze-btn" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-200">
            Analyze Vibe
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
    </div>

    <!-- 弹窗邮箱收集 -->
    <div id="email-popup">
        <div style="background:white; padding:2rem; border-radius:1rem; max-width:400px; width:90%;">
            <h2 style="font-weight:bold; margin-bottom:1rem;">Get Early Access</h2>
            <form id="email-collect-form">
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit">Sign Up</button>
            </form>
            <button id="close-popup">Close</button>
        </div>
    </div>

    <!-- Private Beta Section 和其他 sections 保持原样 -->

    <!-- 你的原有 JS -->
    <script>
        const analyzeBtn = document.getElementById('analyze-btn');
        const urlInput = document.getElementById('url-input');
        const betaMessage = document.getElementById('beta-message');
        const emailPopup = document.getElementById('email-popup');
        const emailForm = document.getElementById('email-collect-form');
        const closePopup = document.getElementById('close-popup');

        analyzeBtn.addEventListener('click', function() {
            // GA4 点击事件
            gtag('event', 'analyze_click');

            const url = urlInput.value.trim();
            if(url.includes('youtube.com') || url.includes('youtu.be')) {
                this.disabled = true;
                this.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Checking Vibe...`;

                setTimeout(() => {
                    betaMessage.classList.add('show-section');
                    this.disabled = false;
                    this.innerHTML = 'Analyze Vibe <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>';
                    betaMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });

                    // 弹出邮箱收集
                    emailPopup.style.display = 'flex';
                }, 1500);
            } else {
                const originalText = this.innerHTML;
                this.innerHTML = "Invalid YouTube Link";
                this.classList.replace('bg-indigo-600', 'bg-red-500');
                setTimeout(() => {
                    this.innerHTML = originalText;
                    this.classList.replace('bg-red-500', 'bg-indigo-600');
                }, 2000);
            }
        });

        // 弹窗表单提交
        emailForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailForm.email.value;
            console.log('Collected email:', email); // 可替换成 Google Sheet / Mailchimp API
            alert('Thanks! We will notify you.');
            emailForm.reset();
            emailPopup.style.display = 'none';
        });

        closePopup.addEventListener('click', () => {
            emailPopup.style.display = 'none';
        });

        // 原有表单处理函数
        function handleForm(formId) {
            document.getElementById(formId).addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = this.querySelector('button');
                const input = this.querySelector('input');
                btn.disabled = true;
                btn.innerHTML = 'Adding you...';
                setTimeout(() => {
                    btn.innerHTML = 'You\'re In! 🔥';
                    btn.classList.remove('bg-indigo-600', 'bg-white');
                    btn.classList.add('bg-green-500', 'text-white');
                    input.value = '';
                }, 1000);
            });
        }
        handleForm('waitlist-form');
        handleForm('beta-form');
    </script>
</body>
</html>
